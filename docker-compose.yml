services:
  db:
    image: pgvector/pgvector:pg17
    container_name: ${CONTAINER_NAME:-pgvector_db}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vectordb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vectordb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  pgdata:
    name: ${CONTAINER_NAME:-pgvector_db}_data

networks:
  # Shared with your app's compose project. Set NETWORK_NAME in .env to your
  # app's network, then create it once (if it doesn't exist):
  #   docker network create <NETWORK_NAME>
  app_network:
    external: true
    name: ${NETWORK_NAME:-pgvector_net}
